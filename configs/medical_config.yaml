project_name: "medical_mimic_analysis"

profiling:
  high_cardinality_threshold: 50 # Seuils bas pour détecter tous les codes médicaux

hypergraph:
  construction_mode: "semantic" # Utilise les ontologies médicales si dispo
  pruning_threshold: 0.05

model:
  architecture: "RHT"
  hidden_dim: 256
  
  pente:
    categorical_dim: 128 # Plus grand pour les codes ICD
    temporal_dim: 64 # Plus fin pour les signes vitaux
    use_attention: true

training:
  epochs: 20
  batch_size: 16 # Batchs plus petits car graphes denses
  learning_rate: 0.0005
  
monitoring:
  drift_threshold: 0.05 # Sensibilité élevée pour la santé
