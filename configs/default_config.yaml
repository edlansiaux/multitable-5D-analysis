# Configuration par défaut pour MT5D Framework
# Section 5: Seven-Step Methodology

project_name: "mt5d_analysis"
output_dir: "./outputs"
seed: 42

# Step 0: Profiling
profiling:
  high_cardinality_threshold: 100
  detect_temporal_columns: true
  temporal_keywords: ["time", "date", "ts", "created_at"]

# Step 1: Hypergraph Construction
hypergraph:
  node_dim: 128
  construction_mode: "adaptive" # options: adaptive, static
  pruning_threshold: 0.1 # Pour le differentiable pruning (Algorithme 1)

# Step 2: PentE Embeddings
model:
  architecture: "RHT"
  input_dim: 128 # Doit matcher hypergraph.node_dim
  hidden_dim: 256
  output_dim: 64 # Dimension de l'espace latent final
  dropout: 0.1
  
  pente:
    use_pente: true
    relation_dim: 64
    temporal_dim: 32
    categorical_dim: 64
    volume_dim: 16
    use_attention: true

# Step 3 & 4: Training & Rewiring
training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  optimizer: "adamw"
  weight_decay: 1e-4
  
  # Loss components (Eq 4)
  alpha_task: 1.0
  beta_sparse: 0.01
  gamma_semantic: 0.1
  
  # Graph Rewiring
  enable_rewiring: true
  rewiring_interval: 5 # Rewire tous les N epochs

# Step 6: Federated Learning
federated:
  enabled: false
  strategy: "fed_avg"
  num_rounds: 10
  clients_per_round: 3

# Step 7: Drift Detection
monitoring:
  drift_threshold: 0.1
  reference_window_size: 1000
