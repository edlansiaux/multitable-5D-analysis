version: '3.8'

services:
  mt5d-api:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./configs:/app/configs
    environment:
      - PYTHONUNBUFFERED=1
    command: python mt5d/api/main.py

  # Exemple de service de monitoring (ex: Prometheus/Grafana) ou DB
  # database:
  #   image: postgres:13
  #   environment:
  #     POSTGRES_DB: mt5d_meta
